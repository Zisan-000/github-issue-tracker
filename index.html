<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />

    <title>Github Issue Tracker</title>
    <style>
      body {
        font-family: "Geist", sans-serif;
        background-color: #f8fafc;
      }
    </style>
  </head>

  <body class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-[520px] shadow-lg rounded-xl p-6 md:p-10">
      <div class="text-center mb-8">
        <img
          src="./assets/github-logo.png"
          alt="Github Logo"
          class="mx-auto w-16 mb-4"
        />
        <h1 class="font-bold text-2xl text-gray-900">GitHub Issue Tracker</h1>
        <p class="font-light text-sm text-[#64748B] mt-1">
          Sign in to manage your issues
        </p>
      </div>

      <div class="flex flex-col gap-5">
        <fieldset class="fieldset w-full">
          <legend class="fieldset-legend font-semibold text-gray-700">
            Username
          </legend>
          <input
            type="text"
            class="input w-full bg-gray-50 border-gray-200"
            placeholder="Enter Username"
            id="username"
          />
          <p class="text-purple-600 text-xs mt-1 font-medium">Default: admin</p>
        </fieldset>

        <fieldset class="fieldset w-full">
          <legend class="fieldset-legend font-semibold text-gray-700">
            Password
          </legend>
          <input
            type="password"
            class="input w-full bg-gray-50 border-gray-200"
            placeholder="Enter Password"
            id="password"
          />
          <p class="text-purple-600 text-xs mt-1 font-medium">
            Default: admin123
          </p>
        </fieldset>

        <button
          onclick="signIn()"
          class="btn btn-primary rounded-lg w-full mt-2"
        >
          Sign In
        </button>
      </div>

      <div class="divider my-8 text-gray-400 text-sm">OR</div>

      <div class="text-center">
        <p class="text-gray-500 text-sm mb-3">Demo Credentials:</p>
        <div
          class="bg-[#f8fafc] w-full py-5 rounded-lg flex flex-col items-center justify-center border border-gray-100"
        >
          <div class="text-left inline-block">
            <p class="text-sm text-gray-600 mb-1">
              <span class="font-bold text-gray-800">Username:</span> admin
            </p>
            <p class="text-sm text-gray-600">
              <span class="font-bold text-gray-800">Password:</span> admin123
            </p>
          </div>
        </div>
      </div>
    </div>

    <script src="./script/index.js"></script>
  </body>
</html>
